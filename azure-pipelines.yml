trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  azureServiceConnection: 'sc-appservice-dotnet'
  webAppName: 'wa-dotnet-microsoft'

stages:
- stage: Build
  displayName: 'Build and publish'
  jobs:
  - job: Build
    displayName: 'Build job'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        version: '8.x'

    - script: dotnet publish -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/app
      displayName: 'Publish app'

    - script: dotnet tool install --global dotnet-ef
      displayName: 'Install EF Core tools'

    - script: |
        export PATH="$PATH:$HOME/.dotnet/tools"
        dotnet ef migrations bundle --runtime linux-x64 --self-contained -o $(Build.ArtifactStagingDirectory)/migrationsbundle/migrationsbundle
      displayName: 'Build migrations bundle'

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop
      displayName: 'Publish build artifacts'

- stage: Deploy
  displayName: 'Deploy to App Service'
  dependsOn: Build
  jobs:
  - deployment: Deploy
    displayName: 'Deploy job'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: 'webAppLinux'
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/app'